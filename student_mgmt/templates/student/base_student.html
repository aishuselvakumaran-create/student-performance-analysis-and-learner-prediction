{% extends 'base.html' %}
{% block role_label %}Student Portal{% endblock %}
{% block sidebar_nav %}
<div class="nav-section">
  <div class="nav-section-title">Overview</div>
  <a href="{% url 'student_dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
    <i class="fas fa-th-large"></i> Dashboard
  </a>
</div>
<div class="nav-section">
  <div class="nav-section-title">My Academics</div>
  <a href="{% url 'student_marklist' %}" class="nav-item {% if request.resolver_match.url_name == 'student_marklist' %}active{% endif %}">
    <i class="fas fa-clipboard-list"></i> My Marks
  </a>
  <a href="{% url 'student_profile' %}" class="nav-item {% if request.resolver_match.url_name == 'student_profile' %}active{% endif %}">
    <i class="fas fa-user-circle"></i> My Profile
  </a>
  <a href="{% url 'student_notifications' %}" class="nav-item {% if request.resolver_match.url_name == 'student_notifications' %}active{% endif %}">
    <i class="fas fa-bell"></i> Notifications
    {% if unread_count %}<span class="nav-badge">{{ unread_count }}</span>{% endif %}
  </a>
</div>
{% endblock %}

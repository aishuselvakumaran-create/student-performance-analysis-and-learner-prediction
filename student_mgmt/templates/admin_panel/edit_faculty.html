{% extends 'admin_panel/base_admin.html' %}
{% block title %}Edit Faculty – EduTrack{% endblock %}
{% block page_title %}Edit Faculty{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>Edit Faculty</h1><p>Update details for {{ faculty.get_full_name }}</p></div>
  <a href="{% url 'view_faculty' %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card">
  <form method="POST">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group"><label>First Name *</label><input class="form-control" type="text" name="first_name" value="{{ faculty.first_name }}" required/></div>
      <div class="form-group"><label>Last Name *</label><input class="form-control" type="text" name="last_name" value="{{ faculty.last_name }}" required/></div>
      <div class="form-group"><label>Faculty ID *</label><input class="form-control" type="text" name="faculty_id" value="{{ faculty.faculty_id }}" required/></div>
      <div class="form-group"><label>Email *</label><input class="form-control" type="email" name="email" value="{{ faculty.email }}" required/></div>
      <div class="form-group"><label>New Password <span style="color:#94a3b8;font-weight:400">(leave blank to keep)</span></label><input class="form-control" type="password" name="password"/></div>
      <div class="form-group">
        <label>Department *</label>
        <select class="form-control" name="department" required>
          {% for val,label in departments %}<option value="{{ val }}" {% if val == faculty.department %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Phone Number</label><input class="form-control" type="tel" name="phone_number" value="{{ faculty.phone_number }}"/></div>
      <div class="form-group"><label>Date of Birth</label><input class="form-control" type="date" name="dob" value="{{ faculty.dob|date:'Y-m-d' }}"/></div>
      <div class="form-group" style="grid-column:1/-1"><label>Address</label><textarea class="form-control" name="address" rows="2">{{ faculty.address }}</textarea></div>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Faculty</button>
      <a href="{% url 'view_faculty' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
